apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ecommerce-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http

          env:
            - name: INTERNAL_API_URL
              value: "http://api-gateway:4000/api"
            - name: NODE_ENV
              value: "production"

            - name: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
            - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY

            - name: NEXT_PUBLIC_API_URL
              value: "https://rohit-ecommerce-microservice.dedyn.io/api"
            - name: NEXT_PUBLIC_ORIGIN_URL
              value: "https://rohit-ecommerce-microservice.dedyn.io"
            - name: NEXT_PUBLIC_AWS_REGION
              value: "ap-south-1"
            - name: NEXT_PUBLIC_AWS_BUCKET_NAME
              value: "ecommerce-node-microservices"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
