          docker build -f apps/catalog/Dockerfile -t iad.ocir.io/idgxrtixsdtd/ecommerce:catalog .
          docker push iad.ocir.io/idgxrtixsdtd/ecommerce:catalog
      - name: K8s Rollout Restart
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/catalog-service

  deploy-cart:
