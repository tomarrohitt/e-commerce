name: Production Auto-Deploy
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      catalog: ${{ steps.filter.outputs.catalog }}
      cart: ${{ steps.filter.outputs.cart }}
      orders: ${{ steps.filter.outputs.orders }}
      invoice: ${{ steps.filter.outputs.invoice }}
      email: ${{ steps.filter.outputs.email }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend: 'frontend/**'
            api-gateway: 'ecommerce-monorepo/apps/api-gateway/**'
            cart: 'ecommerce-monorepo/apps/cart/**'
            catalog: 'ecommerce-monorepo/apps/catalog/**'
            email: 'ecommerce-monorepo/apps/email/**'
            identity: 'ecommerce-monorepo/apps/identity/**'
            invoice: 'ecommerce-monorepo/apps/invoice/**'
            orders: 'ecommerce-monorepo/apps/orders/**'

  deploy-frontend:
    needs: detect-changes
    # if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: iad.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      # Sets up hardware emulation so the Intel runner can compile ARM64 binaries natively
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Initializes the advanced Docker Buildx engine required for cross-platform packaging
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Multi-Platform Image
        run: |
          cd frontend
          # Force the compiler to output a native ARM64 image matching your Oracle VM architecture
          docker buildx build --platform linux/arm64 -t iad.ocir.io/idgxrtixsdtd/ecommerce:frontend --push .

      - name: Setup Kubeconfig
        env:
          RAW_KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$RAW_KUBECONFIG" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          # Route directly across the internet to your cluster's hosting server
          kubectl rollout restart deployment/frontend --server="https://157.151.245.174:6443" --insecure-skip-tls-verify=true --request-timeout="15s"

  deploy-api-gateway:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.api-gateway == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: iad.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build & Push
        run: |
          cd ecommerce-monorepo
          docker build -f apps/api-gateway/Dockerfile -t iad.ocir.io/idgxrtixsdtd/ecommerce:api-gateway .
          docker push iad.ocir.io/idgxrtixsdtd/ecommerce:api-gateway
      - name: K8s Rollout Restart
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/api-gateway

  deploy-identity:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.identity == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: iad.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build & Push
        run: |
          cd ecommerce-monorepo
          docker build -f apps/identity/Dockerfile -t iad.ocir.io/idgxrtixsdtd/ecommerce:identity .
          docker push iad.ocir.io/idgxrtixsdtd/ecommerce:identity
      - name: K8s Rollout Restart
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/identity-service

  deploy-catalog:
