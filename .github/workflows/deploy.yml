name: Production Auto-Deploy
on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      catalog: ${{ steps.filter.outputs.catalog }}
      cart: ${{ steps.filter.outputs.cart }}
      orders: ${{ steps.filter.outputs.orders }}
      invoice: ${{ steps.filter.outputs.invoice }}
      email: ${{ steps.filter.outputs.email }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend: 'frontend/**'
            api-gateway: 'ecommerce-monorepo/apps/api-gateway/**'
            cart: 'ecommerce-monorepo/apps/cart/**'
            catalog: 'ecommerce-monorepo/apps/catalog/**'
            email: 'ecommerce-monorepo/apps/email/**'
            identity: 'ecommerce-monorepo/apps/identity/**'
            invoice: 'ecommerce-monorepo/apps/invoice/**'
            orders: 'ecommerce-monorepo/apps/orders/**'

  deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - name: Process Monorepo Deployments Natively via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 157.151.245.174
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -x

            # --- 1. FRONTEND SERVICE ---
            if [ "${{ needs.detect-changes.outputs.frontend }}" = "true" ]; then
              echo ">>> Deploying Frontend..."
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              git checkout . && git pull origin main && \
              cd /home/ubuntu/home/apps/e-commerce/frontend && \
              docker build -t ecommerce-frontend:latest . && \
              docker save ecommerce-frontend:latest | sudo k3s ctr images import - \
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              kubectl apply -f infra/k8s/frontend-service-deployment.yaml && \
              kubectl rollout restart deployment/frontend || exit 1
            fi

            # --- 2. API GATEWAY ---
            if [ "${{ needs.detect-changes.outputs.api-gateway }}" = "true" ]; then
              echo ">>> Deploying API Gateway..."
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              git checkout . && git pull origin main && \
              docker build -f apps/api-gateway/Dockerfile -t ecommerce-api-gateway:latest . && \
              docker save ecommerce-api-gateway:latest | sudo k3s ctr images import - \
              kubectl rollout restart deployment/api-gateway || exit 1
            fi

            # --- 3. IDENTITY SERVICE ---
            if [ "${{ needs.detect-changes.outputs.identity }}" = "true" ]; then
              echo ">>> Deploying Identity Service..."
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              git checkout . && git pull origin main && \
              docker build -f apps/identity/Dockerfile -t ecommerce-identity:latest . && \
              docker save ecommerce-identity:latest | sudo k3s ctr images import - \
              kubectl rollout restart deployment/identity-service || exit 1
            fi

            # --- 4. CATALOG SERVICE ---
            if [ "${{ needs.detect-changes.outputs.catalog }}" = "true" ]; then
              echo ">>> Deploying Catalog Service..."
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              git checkout . && git pull origin main && \
              docker build -f apps/catalog/Dockerfile -t ecommerce-catalog:latest . && \
              docker save ecommerce-catalog:latest | sudo k3s ctr images import - \
              kubectl rollout restart deployment/catalog-service || exit 1
            fi

            # --- 5. CART SERVICE ---
            if [ "${{ needs.detect-changes.outputs.cart }}" = "true" ]; then
              echo ">>> Deploying Cart Service..."
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              git checkout . && git pull origin main && \
              docker build -f apps/cart/Dockerfile -t ecommerce-cart:latest . && \
              docker save ecommerce-cart:latest | sudo k3s ctr images import - \
              kubectl rollout restart deployment/cart-service || exit 1
            fi

            # --- 6. ORDERS SERVICE ---
            if [ "${{ needs.detect-changes.outputs.orders }}" = "true" ]; then
              echo ">>> Deploying Orders Service..."
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              git checkout . && git pull origin main && \
              docker build -f apps/orders/Dockerfile -t ecommerce-orders:latest . && \
              docker save ecommerce-orders:latest | sudo k3s ctr images import - \
              kubectl rollout restart deployment/orders-service || exit 1
            fi

            # --- 7. EMAIL SERVICE ---
            if [ "${{ needs.detect-changes.outputs.email }}" = "true" ]; then
              echo ">>> Deploying Email Service..."
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              git checkout . && git pull origin main && \
              docker build -f apps/email/Dockerfile -t ecommerce-email:latest . && \
              docker save ecommerce-email:latest | sudo k3s ctr images import - \
              kubectl rollout restart deployment/email-service || exit 1
            fi

            # --- 8. INVOICE SERVICE ---
            if [ "${{ needs.detect-changes.outputs.invoice }}" = "true" ]; then
              echo ">>> Deploying Invoice Service..."
              cd /home/ubuntu/home/apps/e-commerce/ecommerce-monorepo && \
              git checkout . && git pull origin main && \
              docker build -f apps/invoice/Dockerfile -t ecommerce-invoice:latest . && \
              docker save ecommerce-invoice:latest | sudo k3s ctr images import - \
              kubectl rollout restart deployment/invoice-service || exit 1
            fi

