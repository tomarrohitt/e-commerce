          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build & Push
        run: |
          cd ecommerce-monorepo
          docker build -f apps/orders/Dockerfile -t iad.ocir.io/idgxrtixsdtd/ecommerce:orders .
          docker push iad.ocir.io/idgxrtixsdtd/ecommerce:orders
      - name: K8s Rollout Restart
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl rollout restart deployment/orders-service

  deploy-email:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.email == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
